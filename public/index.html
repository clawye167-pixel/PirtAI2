<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PirtAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="background-layer"></div>
    <main class="page-shell">
      <section id="authView" class="auth-view">
        <div class="auth-card">
          <p class="eyebrow">PirtAI</p>
          <h1 class="title">Hos geldin</h1>
          <p class="subtitle">Kullanici adin ve sifrenle giris yap. Hesabin yoksa ilk giriste otomatik olusturulur.</p>

          <form id="loginForm" class="auth-form">
            <label for="loginUsername">Kullanici Adi</label>
            <input id="loginUsername" type="text" minlength="3" maxlength="24" required />

            <label for="loginPassword">Sifre</label>
            <input id="loginPassword" type="password" minlength="6" required />

            <button class="primary-btn" type="submit">Giris</button>
          </form>

          <p id="authStatus" class="status-line"></p>
        </div>
      </section>

      <section id="appView" class="app-view hidden">
        <aside class="sidebar">
          <div class="brand-block">
            <p class="eyebrow">PirtAI</p>
            <h2 class="brand-title">Sohbetler</h2>
          </div>
          <button id="newConversationBtn" class="secondary-btn" type="button">+ Yeni Sohbet</button>
          <div id="conversationList" class="conversation-list"></div>
        </aside>

        <section class="chat-area">
          <header class="chat-header">
            <div>
              <h2 id="chatTitle">Sohbet sec</h2>
              <p class="chat-subtitle">Kahverengi temali PirtAI</p>
            </div>
            <div class="header-actions">
              <a id="adminLink" class="secondary-btn hidden" href="/admin.html">Admin Panel</a>
              <button id="logoutBtn" class="ghost-btn" type="button">Cikis</button>
            </div>
          </header>

          <div id="messageList" class="message-list">
            <p class="empty-state">Mesajlasmaya baslamak icin soldan sohbet sec veya yeni sohbet ac.</p>
          </div>

          <form id="composerForm" class="composer-form">
            <textarea id="messageInput" rows="2" maxlength="4000" placeholder="Mesajini yaz..." required></textarea>
            <button id="sendBtn" class="primary-btn" type="submit">Gonder</button>
          </form>
          <p id="chatStatus" class="status-line"></p>
        </section>
      </section>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
